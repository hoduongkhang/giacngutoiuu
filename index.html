<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SleepSync</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s;
}

/* DARK MODE */
body.dark {
    background: #1e1e1e;
    color: white;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 340px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

body.dark .container {
    background: #2a2a2a;
}

.desc {
    font-size: 13px;
    color: gray;
    margin-bottom: 15px;
}

body.dark .desc {
    color: #bbb;
}

select {
    padding: 6px;
    margin-top: 10px;
}

.time-box {
    margin-top: 10px;
}

button.main {
    margin-top: 15px;
    padding: 8px 16px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
}

/* toggle */
.theme-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 48px;
    height: 24px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #dcdcdc;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.theme-btn::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: white;
    top: 3px;
    left: 3px;
    transition: 0.3s;
}

body.dark .theme-btn {
    background: #444;
}

body.dark .theme-btn::before {
    transform: translateX(24px);
}

.result {
    margin-top: 20px;
}

.time {
    margin: 5px 0;
    padding: 6px;
}

.good { color: green; }
.ok { color: orange; }
.bad { color: red; }

.note {
    margin-top: 10px;
    font-size: 13px;
    color: #555;
}

body.dark .note {
    color: #ccc;
}

select {
    font-size: 14px;
}
</style>
</head>

<body>

<button class="theme-btn" onclick="toggleDark()"></button>

<div class="container">
    <h1>SleepSync</h1>

    <div class="desc">
        Tính giờ ngủ / thức dậy theo chu kỳ 90 phút.
    </div>

    <select id="mode">
        <option value="wake">Tính giờ nên ngủ</option>
        <option value="sleep">Tính giờ nên thức dậy</option>
    </select>

    <!-- GIỜ 00-23 -->
    <div class="time-box">
        <select id="hour"></select> :
        <select id="minute"></select>
    </div>

    <button class="main" onclick="calculate()">Tính</button>

    <div class="result" id="result"></div>
</div>

<script>

function toggleDark() {
    document.body.classList.toggle("dark");
}

// tạo giờ 00–23
let hour = document.getElementById("hour");
for (let i = 0; i < 24; i++) {
    let o = document.createElement("option");
    o.value = i;
    o.text = i.toString().padStart(2, "0");
    hour.appendChild(o);
}

// tạo phút 00–59
let minute = document.getElementById("minute");
for (let i = 0; i < 60; i++) {
    let o = document.createElement("option");
    o.value = i;
    o.text = i.toString().padStart(2, "0");
    minute.appendChild(o);
}

function calculate() {
    let mode = document.getElementById("mode").value;
    let h = parseInt(document.getElementById("hour").value);
    let m = parseInt(document.getElementById("minute").value);

    let html = "";

    if (mode === "wake") {
        html = "Giờ nên đi ngủ:<br>";

        for (let i = 6; i >= 3; i--) {
            let total = h * 60 + m - i * 90;
            let hour = Math.floor((total / 60) % 24);
            let minute = total % 60;

            if (minute < 0) {
                minute += 60;
                hour--;
            }
            if (hour < 0) hour += 24;

            let cls = i >= 5 ? "good" : (i === 4 ? "ok" : "bad");

            html += `<div class="time ${cls}">
                ${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}
            </div>`;
        }

    } else {
        html = "Giờ nên thức dậy:<br>";

        for (let i = 3; i <= 6; i++) {
            let total = h * 60 + m + i * 90;
            let hour = Math.floor((total / 60) % 24);
            let minute = total % 60;

            if (minute < 0) {
                minute += 60;
                hour--;
            }
            if (hour < 0) hour += 24;

            let cls = i >= 5 ? "good" : (i === 4 ? "ok" : "bad");

            html += `<div class="time ${cls}">
                ${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}
            </div>`;
        }
    }

    html += `<div class="note">Xanh: tốt • Cam: tạm • Đỏ: không nên</div>`;
    document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
