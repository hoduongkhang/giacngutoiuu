<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIẤC NGỦ KHỎE</title>

<style>
* {
    box-sizing: border-box;
    font-family: system-ui, Arial;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f8;
    transition: 0.3s;
}

body.dark {
    background: #0f1115;
    color: white;
}

.card {
    width: 92%;
    max-width: 380px;
    padding: 24px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    text-align: center;
    transition: 0.3s;
}

body.dark .card {
    background: #1b1f27;
}

h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 1px;
}

.sub {
    font-size: 13px;
    opacity: 0.7;
    margin: 10px 0 18px;
}

select, button {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    outline: none;
    margin-top: 10px;
}

select {
    background: #f1f3f5;
}

body.dark select {
    background: #2a2f3a;
    color: white;
}

.time {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.time select {
    width: 45%;
}

.btn {
    background: #111;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.03);
}

body.dark .btn {
    background: #fff;
    color: black;
}

.result {
    margin-top: 18px;
}

.box {
    margin: 6px auto;
    padding: 10px;
    border-radius: 12px;
    width: 90%;
    background: rgba(0,0,0,0.04);
}

body.dark .box {
    background: rgba(255,255,255,0.05);
}

.good { color: #2ecc71; font-weight: bold; }
.ok { color: #f39c12; font-weight: bold; }
.bad { color: #e74c3c; font-weight: bold; }

.note {
    font-size: 12px;
    margin-top: 10px;
    opacity: 0.7;
}

.toggle {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 14px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #111;
    color: white;
}

body.dark .toggle {
    background: white;
    color: black;
}

/* mobile tối ưu */
@media (max-width: 500px) {
    .card {
        padding: 18px;
        border-radius: 16px;
    }
}
</style>
</head>

<body>

<div class="card">

    <h1>GIẤC NGỦ KHỎE</h1>
    <div class="sub">Tối ưu giấc ngủ để bạn tỉnh táo hơn mỗi ngày</div>

    <select id="mode">
        <option value="wake">Tính giờ đi ngủ</option>
        <option value="sleep">Tính giờ thức dậy</option>
    </select>

    <div class="time">
        <select id="hour"></select>
        <select id="minute"></select>
    </div>

    <button class="btn" onclick="calculate()">TÍNH</button>

    <div class="result" id="result"></div>

</div>

<button class="toggle" onclick="toggleDark()">Đổi giao diện</button>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

let hour = document.getElementById("hour");
for (let i = 0; i < 24; i++) {
    hour.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
}

let minute = document.getElementById("minute");
for (let i = 0; i < 60; i++) {
    minute.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
}

document.getElementById("mode").addEventListener("change", function () {
    document.querySelector(".sub").innerText =
        this.value === "wake"
        ? "Nhập giờ thức dậy"
        : "Nhập giờ đi ngủ";
});

function calculate() {
    let mode = document.getElementById("mode").value;
    let h = +document.getElementById("hour").value;
    let m = +document.getElementById("minute").value;

    let html = "";

    if (mode === "wake") {
        html = "Giờ nên đi ngủ:<br>";

        for (let i = 6; i >= 3; i--) {
            let t = h * 60 + m - i * 90;
            let hh = (Math.floor(t / 60) + 24) % 24;
            let mm = (t % 60 + 60) % 60;

            let cls = i >= 5 ? "good" : i === 4 ? "ok" : "bad";

            html += `<div class="box ${cls}">
                ${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}
            </div>`;
        }

    } else {
        html = "Giờ nên thức dậy:<br>";

        for (let i = 3; i <= 6; i++) {
            let t = h * 60 + m + i * 90;
            let hh = (Math.floor(t / 60)) % 24;
            let mm = t % 60;

            let cls = i >= 5 ? "good" : i === 4 ? "ok" : "bad";

            html += `<div class="box ${cls}">
                ${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}
            </div>`;
        }
    }

    html += `<div class="note">
        🟢 tốt | 🟠 tạm | 🔴 không nên
    </div>`;

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
