<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>GIẤC NGỦ KHỎE</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#0f172a;
}

.card{
    width:360px;
    text-align:center;
    color:white;
}

h1{
    margin:0;
    font-size:26px;
    letter-spacing:1px;
    color:#f5c542;
}

.desc{
    font-size:13px;
    color:#aaa;
    margin:10px 0 20px;
    line-height:1.4;
}

select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    background:#1e293b;
    color:white;
    text-align:center;
}

.time{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.time select{
    width:90px;
}

label{
    display:block;
    margin-top:15px;
    font-size:14px;
    color:#ddd;
}

button{
    margin-top:18px;
    padding:10px;
    width:60%;
    border:none;
    border-radius:10px;
    background:#f5c542;
    cursor:pointer;
    font-weight:bold;
}

.result{
    margin-top:20px;
}

.item{
    margin:6px auto;
    width:70%;
    padding:8px;
    border-radius:8px;
    background:#1e293b;
}

.good{color:#22c55e;font-weight:bold;}
.ok{color:#f59e0b;font-weight:bold;}
.bad{color:#ef4444;font-weight:bold;}

.note{
    margin-top:10px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

<h1>GIẤC NGỦ KHỎE</h1>

<div class="desc">
Tối ưu giấc ngủ để bạn tỉnh táo hơn và bắt đầu ngày mới nhẹ nhàng.
</div>

<select id="mode">
<option value="wake">Tính giờ nên ngủ</option>
<option value="sleep">Tính giờ nên thức dậy</option>
</select>

<label id="labelText">Chọn giờ:</label>

<div class="time">
<select id="hour"></select> :
<select id="minute"></select>
</div>

<button onclick="calc()">Tính</button>

<div class="result" id="result"></div>

</div>

<script>

let h=document.getElementById("hour");
for(let i=0;i<24;i++){
    h.innerHTML+=`<option value="${i}">${i.toString().padStart(2,"0")}</option>`;
}

let m=document.getElementById("minute");
for(let i=0;i<60;i++){
    m.innerHTML+=`<option value="${i}">${i.toString().padStart(2,"0")}</option>`;
}

document.getElementById("mode").onchange=function(){
    document.getElementById("labelText").innerText =
    this.value==="wake"?"Nhập giờ muốn thức dậy":"Nhập giờ muốn đi ngủ";
}

function calc(){
    let mode=document.getElementById("mode").value;
    let hh=parseInt(h.value);
    let mm=parseInt(m.value);

    let html="";

    if(mode==="wake"){
        html="Giờ nên đi ngủ:<br>";

        for(let i=6;i>=3;i--){
            let t=hh*60+mm-i*90;
            let H=Math.floor((t/60)%24);
            let M=t%60;

            if(M<0){M+=60;H--;}
            if(H<0)H+=24;

            let c=i>=5?"good":i===4?"ok":"bad";

            html+=`<div class="item ${c}">
                ${H.toString().padStart(2,"0")}:${M.toString().padStart(2,"0")}
            </div>`;
        }
    }
    else{
        html="Giờ nên thức dậy:<br>";

        for(let i=3;i<=6;i++){
            let t=hh*60+mm+i*90;
            let H=Math.floor((t/60)%24);
            let M=t%60;

            let c=i>=5?"good":i===4?"ok":"bad";

            html+=`<div class="item ${c}">
                ${H.toString().padStart(2,"0")}:${M.toString().padStart(2,"0")}
            </div>`;
        }
    }

    html+=`<div class="note">Xanh: tốt • Cam: tạm • Đỏ: không nên</div>`;
    document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
